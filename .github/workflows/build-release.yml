name: Build Windows EXE

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build executable
        shell: pwsh
        run: .\.venv\Scripts\python.exe build.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarThunderRPC_Setup
          path: dist/WarThunderRPC_Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Attach executable to GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/WarThunderRPC_Setup.exe" --clobber
